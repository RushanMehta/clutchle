<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clutchle - The Ultimate Win</title>
    <style>
        body {
            background-color: #121213;
            color: white;
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }
        header {
            border-bottom: 1px solid #3a3a3c;
            width: 100%;
            text-align: center;
            max-width: 500px;
        }
        h1 { margin: 10px 0; font-size: 2.5rem; letter-spacing: 2px; }
        #grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 5px;
            padding: 10px;
            width: 350px;
            height: 420px;
            max-width: 100%;
        }
        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 5px;
        }
        .tile {
            border: 2px solid #3a3a3c;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
        }
        .tile.filled { border-color: #565758; }
        .correct { background-color: #538d4e; border-color: #538d4e; }
        .present { background-color: #b59f3b; border-color: #b59f3b; }
        .absent { background-color: #3a3a3c; border-color: #3a3a3c; }
        #keyboard {
            margin: 15px 0 0 0;
            width: 100%;
            max-width: 500px;
        }
        .keyboard-row {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
            touch-action: manipulation;
        }
        .key {
            background-color: #818384;
            color: white;
            border: 0;
            padding: 0;
            margin: 0 3px;
            height: 58px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
        }
        .key.wide { flex: 1.5; }
        #message {
            height: 30px;
            color: #b59f3b;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 10px;
            text-align: center;
        }
        #restart-btn {
            display: none;
            margin-top: 15px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #538d4e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }
        #restart-btn:hover { background-color: #43733f; }
    </style>
</head>
<body>

    <header>
        <h1>CLUTCHLE</h1>
    </header>

    <div id="grid"></div>
    <div id="message"></div>
    <button id="restart-btn" onclick="resetGame()">Play Again</button>
    <div id="keyboard"></div>

    <script>
        // Real 5-letter word dictionary list (Validates real words & picks target)
        const dictionary = [
            "APPLE", "BEACH", "CHIEF", "DRIVE", "EARTH", "FLUTE", "GRAPE", "HOUSE", 
            "INDEX", "JUICE", "KNIFE", "LIGHT", "MONEY", "NIGHT", "OCEAN", "PLANT", 
            "QUEEN", "RADIO", "SNAKE", "TRAIN", "UNDER", "VOICE", "WATER", "YOUTH",
            "BLAST", "CRANE", "FROST", "GHOST", "PIVOT", "SHARK", "STORM", "TIGER",
            "ABOVE", "ADULT", "AGENT", "ANGER", "AWARD", "BRICK", "CHAIR", "CLAIM",
            "CLOCK", "CLOTH", "COACH", "COAST", "COUNT", "COURT", "COVER", "CREAM",
            "CROWD", "CROWN", "DANCE", "DEPTH", "DRAFT", "DRAMA", "DREAM", "DRESS",
            "DRINK", "ENEMY", "ENTRY", "FAITH", "FAULT", "FIELD", "FIGHT", "FINAL",
            "FLOOR", "FOCUS", "FORCE", "FRAME", "FRONT", "FRUIT", "GLASS", "GLOVE"
        ];

        let targetWord = "";
        const maxAttempts = 6;
        let attempts = 0;
        let currentGuess = "";
        let gameOver = false;
        
        const grid = document.getElementById("grid");
        const keyboard = document.getElementById("keyboard");
        const messageEl = document.getElementById("message");
        const restartBtn = document.getElementById("restart-btn");

        // Initialize Game Grid
        function buildGrid() {
            grid.innerHTML = "";
            for (let i = 0; i < maxAttempts; i++) {
                let row = document.createElement("div");
                row.className = "row";
                for (let j = 0; j < 5; j++) {
                    let tile = document.createElement("div");
                    tile.className = "tile";
                    row.appendChild(tile);
                }
                grid.appendChild(row);
            }
        }

        // Initialize Keyboard
        const keyboardLayout = [
            ["q", "w", "e", "r", "t", "y", "u", "i", "o", "p"],
            ["a", "s", "d", "f", "g", "h", "j", "k", "l"],
            ["Enter", "z", "x", "c", "v", "b", "n", "m", "Del"]
        ];
        
        keyboardLayout.forEach(rowArr => {
            let row = document.createElement("div");
            row.className = "keyboard-row";
            rowArr.forEach(key => {
                let btn = document.createElement("button");
                btn.textContent = key;
                btn.className = "key";
                if (key === "Enter" || key === "Del") btn.classList.add("wide");
                btn.id = "key-" + key.toUpperCase();
                btn.addEventListener("click", () => handleInput(key));
                row.appendChild(btn);
            });
            keyboard.appendChild(row);
        });

        // Keyboard Event Listener
        window.addEventListener("keydown", (e) => {
            if (e.key === "Enter") handleInput("Enter");
            else if (e.key === "Backspace") handleInput("Del");
            else if (/^[a-zA-Z]$/.test(e.key)) handleInput(e.key.toLowerCase());
        });

        function handleInput(key) {
            if (gameOver || attempts >= maxAttempts) return;
            let currentRow = grid.children[attempts];

            if (key === "Del") {
                if (currentGuess.length > 0) {
                    currentGuess = currentGuess.slice(0, -1);
                    currentRow.children[currentGuess.length].textContent = "";
                    currentRow.children[currentGuess.length].classList.remove("filled");
                }
            } else if (key === "Enter") {
                if (currentGuess.length === 5) {
                    submitGuess();
                } else {
                    showMessage("Not enough letters!");
                }
            } else if (currentGuess.length < 5 && key !== "Enter" && key !== "Del") {
                currentGuess += key.toUpperCase();
                currentRow.children[currentGuess.length - 1].textContent = key;
                currentRow.children[currentGuess.length - 1].classList.add("filled");
            }
        }

        function submitGuess() {
            // Check if the input is a real word in our dictionary
            if (!dictionary.includes(currentGuess)) {
                showMessage("Not in word list!");
                return;
            }

            attempts++;
            let currentRow = grid.children[attempts - 1];
            
            // Render color coding hints based on the constant target word
            for (let i = 0; i < 5; i++) {
                let letter = currentGuess[i];
                let tile = currentRow.children[i];
                
                if (letter === targetWord[i]) {
                    tile.classList.add("correct");
                } else if (targetWord.includes(letter)) {
                    tile.classList.add("present");
                } else {
                    tile.classList.add("absent");
                }
            }

            // --- WIN OR LOSS VALIDATION CONDITIONS ---
            if (currentGuess === targetWord && attempts === maxAttempts) {
                // The ultimate victory: Right word on the 6th try
                messageEl.style.color = "#538d4e";
                showMessage("Incredible Clutch Victory! 🎉");
                endGame();
            } else if (attempts === maxAttempts) {
                // Made it to the 6th try but typed the wrong word
                showMessage(`Game Over! The word was ${targetWord}`);
                endGame();
            } else if (currentGuess === targetWord && attempts < maxAttempts) {
                // Found the right word early! Let them keep playing to earn the 6th-try victory condition
                showMessage("You found it! Repeat it on try 6 to secure the win!");
                currentGuess = "";
            } else {
                currentGuess = "";
            }
        }

        function showMessage(text) {
            messageEl.textContent = text;
            if (!gameOver && text !== "You found it! Repeat it on try 6 to secure the win!") {
                setTimeout(() => { if(messageEl.textContent === text) messageEl.textContent = ""; }, 2000);
            }
        }

        function endGame() {
            gameOver = true;
            restartBtn.style.display = "block";
        }

        function resetGame() {
            attempts = 0;
            currentGuess = "";
            gameOver = false;
            targetWord = dictionary[Math.floor(Math.random() * dictionary.length)];
            messageEl.textContent = "";
            restartBtn.style.display = "none";
            buildGrid();
        }

        // Run the game loop initial start
        resetGame();
    </script>
</body>
</html>
