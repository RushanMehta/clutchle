<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clutchle - The Daily Challenge</title>
    <style>
        body {
            background-color: #121213;
            color: white;
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }
        header {
            border-bottom: 1px solid #3a3a3c;
            width: 100%;
            text-align: center;
            max-width: 500px;
            padding-bottom: 10px;
        }
        h1 { margin: 10px 0 5px 0; font-size: 2.5rem; letter-spacing: 2px; }
        .subtitle {
            margin: 0;
            font-size: 0.95rem;
            color: #818384;
            line-height: 1.4;
            font-weight: normal;
        }
        #stats-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 300px;
            margin: 10px 0;
            background: #252526;
            padding: 10px;
            border-radius: 8px;
        }
        .stat-box { text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: bold; color: #538d4e; }
        .stat-lbl { font-size: 0.8rem; color: #818384; }
        
        #grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 5px;
            padding: 10px;
            width: 350px;
            height: 420px;
            max-width: 100%;
        }
        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 5px;
        }
        .tile {
            border: 2px solid #3a3a3c;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .tile.filled { border-color: #565758; }
        
        .correct { background-color: #538d4e !important; border-color: #538d4e !important; }
        .present { background-color: #b59f3b !important; border-color: #b59f3b !important; }
        .absent { background-color: #3a3a3c !important; border-color: #3a3a3c !important; }
        .early-lose { background-color: #ba3c3c !important; border-color: #ba3c3c !important; }
        
        #keyboard {
            margin: 15px 0 0 0;
            width: 100%;
            max-width: 500px;
        }
        .keyboard-row {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
            touch-action: manipulation;
        }
        .key {
            background-color: #818384;
            color: white;
            border: 0;
            padding: 0;
            margin: 0 3px;
            height: 58px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
        }
        .key.wide { flex: 1.5; }
        #message {
            height: 30px;
            color: #b59f3b;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 10px;
            text-align: center;
        }
        #timer-container {
            display: none;
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #818384;
        }
        #countdown { color: #538d4e; }
    </style>
</head>
<body>

    <header>
        <h1>CLUTCHLE</h1>
        <p class="subtitle">Find clues for 5 rounds. Guess the secret word on the 6th try to win. Get it early or fail the final round, and you lose.</p>
    </header>

    <div id="stats-container">
        <div class="stat-box"><div class="stat-val" id="stat-played">0</div><div class="stat-lbl">Played</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-wins">0</div><div class="stat-lbl">Wins</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-losses">0</div><div class="stat-lbl">Losses</div></div>
    </div>

    <div id="grid"></div>
    <div id="message"></div>
    
    <div id="timer-container">
        NEXT CLUTCHLE IN: <span id="countdown">00:00:00</span>
    </div>

    <div id="keyboard"></div>

    <script>
        let dictionary = []; 
        let targetWord = "";
        const maxAttempts = 6;
        let attempts = 0;
        let currentGuess = "";
        let gameOver = false;
        let isRevealing = false;
        
        const commonAnswers = [
            "APPLE", "BEACH", "CHIEF", "DRIVE", "EARTH", "FLUTE", "GRAPE", "HOUSE", 
            "INDEX", "JUICE", "KNIFE", "LIGHT", "MONEY", "NIGHT", "OCEAN", "PLANT", 
            "QUEEN", "RADIO", "SNAKE", "TRAIN", "UNDER", "VOICE", "WATER", "YOUTH"
        ];

        const grid = document.getElementById("grid");
        const keyboard = document.getElementById("keyboard");
        const messageEl = document.getElementById("message");
        const timerContainer = document.getElementById("timer-container");
        const countdownEl = document.getElementById("countdown");

        // Load local persistent stats
        let stats = JSON.parse(localStorage.getItem("clutchle_stats")) || { played: 0, wins: 0, losses: 0, lastPlayedDate: "" };

        async function loadDictionary() {
            showMessage("Loading dictionary...");
            try {
                const response = await fetch('https://raw.githubusercontent.com/charlesreid1/five-letter-words/master/sgb-words.txt');
                const text = await response.text();
                dictionary = text.toUpperCase().split('\n').map(word => word.trim()).filter(word => word.length === 5);
                messageEl.textContent = "";
                initGame();
            } catch (error) {
                dictionary = [...commonAnswers];
                initGame();
            }
        }

        function updateStatsUI() {
            document.getElementById("stat-played").textContent = stats.played;
            document.getElementById("stat-wins").textContent = stats.wins;
            document.getElementById("stat-losses").textContent = stats.losses;
        }

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        }

        function initGame() {
            updateStatsUI();
            buildGrid();
            buildKeyboard();

            // Pseudo-random word unique to each calendar date
            const todayStr = getTodayString();
            let seed = 0;
            for (let i = 0; i < todayStr.length; i++) seed += todayStr.charCodeAt(i);
            const wordIndex = seed % commonAnswers.length;
            targetWord = commonAnswers[wordIndex];

            // Check if player already completed today's game
            if (stats.lastPlayedDate === todayStr) {
                gameOver = true;
                showMessage("You have completed today's challenge!");
                startCountdown();
            }
        }

        function buildGrid() {
            grid.innerHTML = "";
            for (let i = 0; i < maxAttempts; i++) {
                let row = document.createElement("div");
                row.className = "row";
                for (let j = 0; j < 5; j++) {
                    let tile = document.createElement("div");
                    tile.className = "tile";
                    row.appendChild(tile);
                }
                grid.appendChild(row);
            }
        }

        function buildKeyboard() {
            keyboard.innerHTML = "";
            const keyboardLayout = [
                ["q", "w", "e", "r", "t", "y", "u", "i", "o", "p"],
                ["a", "s", "d", "f", "g", "h", "j", "k", "l"],
                ["Enter", "z", "x", "c", "v", "b", "n", "m", "Del"]
            ];
            
            keyboardLayout.forEach(rowArr => {
                let row = document.createElement("div");
                row.className = "keyboard-row";
                rowArr.forEach(key => {
                    let btn = document.createElement("button");
                    btn.textContent = key;
                    btn.className = "key";
                    if (key === "Enter" || key === "Del") btn.classList.add("wide");
                    btn.id = "key-" + key.toUpperCase();
                    btn.addEventListener("click", () => handleInput(key));
                    row.appendChild(btn);
                });
                keyboard.appendChild(row);
            });
        }

        window.addEventListener("keydown", (e) => {
            if (e.key === "Enter") handleInput("Enter");
            else if (e.key === "Backspace") handleInput("Del");
            else if (/^[a-zA-Z]$/.test(e.key)) handleInput(e.key.toLowerCase());
        });

        function handleInput(key) {
            if (gameOver || isRevealing || dictionary.length === 0 || attempts >= maxAttempts) return;
            let currentRow = grid.children[attempts];

            if (key === "Del") {
                if (currentGuess.length > 0) {
                    currentGuess = currentGuess.slice(0, -1);
                    currentRow.children[currentGuess.length].textContent = "";
                    currentRow.children[currentGuess.length].classList.remove("filled");
                }
            } else if (key === "Enter") {
                if (currentGuess.length === 5) {
                    submitGuess();
                } else {
                    showMessage("Not enough letters!");
                }
            } else if (currentGuess.length < 5 && key !== "Enter" && key !== "Del") {
                currentGuess += key.toUpperCase();
                currentRow.children[currentGuess.length - 1].textContent = key;
                currentRow.children[currentGuess.length - 1].classList.add("filled");
            }
        }

        function submitGuess() {
            if (!dictionary.includes(currentGuess)) {
                showMessage("Not in word list!");
                return;
            }

            attempts++;
            isRevealing = true; 
            let currentRow = grid.children[attempts - 1];
            
            if (currentGuess === targetWord && attempts < maxAttempts) {
                for (let i = 0; i < 5; i++) currentRow.children[i].classList.add("early-lose");
                messageEl.style.color = "#ba3c3c";
                showMessage(`Instant Loss! You found it too early. The word was ${targetWord}`);
                recordResult(false);
                return;
            }

            let rowStatuses = Array(5).fill("absent"); 
            let targetLetterCounts = {};

            for (let letter of targetWord) {
                targetLetterCounts[letter] = (targetLetterCounts[letter] || 0) + 1;
            }
            for (let i = 0; i < 5; i++) {
                if (currentGuess[i] === targetWord[i]) {
                    rowStatuses[i] = "correct";
                    targetLetterCounts[currentGuess[i]]--;
                }
            }
            for (let i = 0; i < 5; i++) {
                if (rowStatuses[i] !== "correct") {
                    let letter = currentGuess[i];
                    if (targetLetterCounts[letter] > 0) {
                        rowStatuses[i] = "present";
                        targetLetterCounts[letter]--;
                    }
                }
            }

            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    let letter = currentGuess[i];
                    let tile = currentRow.children[i];
                    let status = rowStatuses[i];
                    
                    tile.classList.add(status);
                    updateKeyboardKey(letter, status);

                    if (i === 4) {
                        isRevealing = false; 
                        checkGameEnd();
                    }
                }, i * 300);
            }
        }

        function checkGameEnd() {
            if (currentGuess === targetWord && attempts === maxAttempts) {
                messageEl.style.color = "#538d4e";
                showMessage("Incredible Clutch Victory! 🎉");
                recordResult(true);
            } else if (attempts === maxAttempts) {
                messageEl.style.color = "#ba3c3c";
                showMessage(`Game Over! The word was ${targetWord}`);
                recordResult(false);
            } else {
                currentGuess = "";
            }
        }

        function recordResult(isWin) {
            stats.played++;
            if (isWin) stats.wins++;
            else stats.losses++;
            stats.lastPlayedDate = getTodayString();
            
            localStorage.setItem("clutchle_stats", JSON.stringify(stats));
            updateStatsUI();
            gameOver = true;
            startCountdown();
        }

        function updateKeyboardKey(letter, status) {
            let keyBtn = document.getElementById("key-" + letter);
            if (!keyBtn) return;
            if (keyBtn.classList.contains("correct")) return;
            if (keyBtn.classList.contains("present") && status === "absent") return;
            keyBtn.classList.remove("correct", "present", "absent");
            keyBtn.classList.add(status);
        }

        function showMessage(text) {
            messageEl.textContent = text;
            if (!gameOver && text !== "Loading dictionary...") {
                setTimeout(() => { if(messageEl.textContent === text) messageEl.textContent = ""; }, 2000);
            }
        }

        function startCountdown() {
            timerContainer.style.display = "block";
            function updateTimer() {
                const now = new Date();
                const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
                const diff = tomorrow - now;

                const hours = Math.floor(diff / (1000 * 60 * 60)).toString().padStart(2, '0');
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                const seconds = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');

                countdownEl.textContent = `${hours}:${minutes}:${seconds}`;
            }
            updateTimer();
            setInterval(updateTimer, 1000);
        }

        loadDictionary();
    </script>
</body>
</html>
